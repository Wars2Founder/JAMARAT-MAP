<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>خريطة منشأة الجمرات</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body { margin: 0; direction: rtl; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }
    #status {
      position: absolute; top: 10px; right: 10px;
      background: #fff; padding: 8px 12px; border-radius: 6px;
      z-index: 1000; font-size: 13px; box-shadow: 0 0 5px rgba(0,0,0,.2);
    }
    .legend {
      position: absolute; bottom: 10px; right: 10px;
      background: #fff; padding: 8px 12px; border-radius: 6px;
      z-index: 1000; font-size: 12px; box-shadow: 0 0 5px rgba(0,0,0,.2);
      line-height: 1.6;
    }
    .legend div { margin-bottom: 3px; }
    .legend span {
      display: inline-block; width: 14px; height: 4px; margin-left: 5px;
    }

    /* شكل 3D للجمرات */
    .jamarat-pillar {
      width: 28px;
      height: 45px;
      background: linear-gradient(to bottom, #f5f5f5, #c2c2c2);
      border-radius: 6px;
      border: 2px solid #999;
      box-shadow: 0 4px 6px rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>

<body>
  <div id="status">جاري تحميل خريطة الجمرات...</div>
  <div id="map"></div>
  <div class="legend">
    <div><span style="background:red;"></span>مسارات الدخول</div>
    <div><span style="background:green;"></span>مسارات الخروج</div>
    <div><span style="background:blue;"></span>موقع الحاج الحالي</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const statusBox = document.getElementById("status");

    const JAMARAT_CENTER = [21.4212, 39.8730];

    const map = L.map("map").setView(JAMARAT_CENTER, 18);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 20,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    // =========================
    // 1) الجمرات الثلاث (3D)
    // =========================
    const jamarat = [
      { name: "الجمرة الصغرى",  short: "صغرى",  coords: [21.420300329170075, 39.87414241257917] },
      { name: "الجمرة الوسطى",  short: "وسطى",  coords: [21.421031930626224, 39.87284690548348] },
      { name: "الجمرة الكبرى (العقبة)", short: "كبرى", coords: [21.422113096050488, 39.87112492715235] }
    ];

    function jamaratPillarIcon(label) {
      return L.divIcon({
        className: "",
        html: `<div class="jamarat-pillar">${label}</div>`,
        iconSize: [28, 45],
        iconAnchor: [14, 45]
      });
    }

    jamarat.forEach(j => {
      L.marker(j.coords, {
        icon: jamaratPillarIcon(j.short),
        title: j.name
      })
      .addTo(map)
      .bindPopup(j.name);
    });

    // =========================
    // 2) المداخل والمخارج
    // =========================
    const gates = [
      { key: "souq_in",   name: "مدخل طريق سوق العرب (دخول)", type: "entry", coords: [21.42210, 39.87190] },
      { key: "jawhara_in",name: "مدخل طريق الجوهرة (دخول)",   type: "entry", coords: [21.41990, 39.87190] },
      { key: "walk1_in",  name: "مدخل طريق المشاة 1 (دخول)",  type: "entry", coords: [21.42140, 39.87340] },

      { key: "souq_out",   name: "مخرج طريق سوق العرب (خروج)", type: "exit", coords: [21.42210, 39.87290] },
      { key: "jawhara_out",name: "مخرج طريق الجوهرة (خروج)",   type: "exit", coords: [21.41990, 39.87300] },
      { key: "walk1_out",  name: "مخرج طريق المشاة 1 (خروج)",  type: "exit", coords: [21.42100, 39.87370] }
    ];

    const gateMap = {};
    gates.forEach(g => {
      gateMap[g.key] = g.coords;

      const color = g.type === "entry" ? "red" : "green";
      const icon = L.divIcon({
        className: "",
        html: `<div style="
          width:12px;height:12px;border-radius:50%;
          background:${color};border:2px solid #fff;
          box-shadow:0 0 4px rgba(0,0,0,.5);
        "></div>`
      });

      L.marker(g.coords, { icon, title: g.name })
        .addTo(map)
        .bindPopup(g.name);
    });

    // =========================
    // 3) مسارات الدخول
    // =========================
    const entrySouqAlArab = [
      gateMap["souq_in"],
      [21.42170, 39.87220],
      [21.42120, 39.87240],
      jamarat[0].coords
    ];

    const entryJawhara = [
      gateMap["jawhara_in"],
      [21.42020, 39.87220],
      [21.42050, 39.87240],
      jamarat[1].coords
    ];

    const entryWalk1 = [
      gateMap["walk1_in"],
      [21.42120, 39.87300],
      [21.42100, 39.87270],
      jamarat[2].coords
    ];

    L.polyline(entrySouqAlArab, { color: "red", weight: 5 }).addTo(map);
    L.polyline(entryJawhara, { color: "red", weight: 5 }).addTo(map);
    L.polyline(entryWalk1, { color: "red", weight: 5 }).addTo(map);

    // =========================
    // 4) مسارات الخروج
    // =========================
    const exitSouqAlArab = [
      jamarat[0].coords,
      [21.42140, 39.87260],
      [21.42180, 39.87280],
      gateMap["souq_out"]
    ];

    const exitJawhara = [
      jamarat[1].coords,
      [21.42050, 39.87270],
      [21.42020, 39.87290],
      gateMap["jawhara_out"]
    ];

    const exitWalk1 = [
      jamarat[2].coords,
      [21.42100, 39.87290],
      [21.42120, 39.87320],
      gateMap["walk1_out"]
    ];

    L.polyline(exitSouqAlArab, { color: "green", weight: 5 }).addTo(map);
    L.polyline(exitJawhara, { color: "green", weight: 5 }).addTo(map);
    L.polyline(exitWalk1, { color: "green", weight: 5 }).addTo(map);

    // =========================
    // 5) GPS
    // =========================
    let userMarker = null;
    let userCircle = null;

    function onLocationFound(e) {
      const radius = e.accuracy || 20;

      if (userMarker) {
        userMarker.setLatLng(e.latlng);
        userCircle.setLatLng(e.latlng).setRadius(radius);
      } else {
        userMarker = L.marker(e.latlng).addTo(map).bindPopup("موقعك الحالي");
        userCircle = L.circle(e.latlng, {
          radius: radius,
          color: "blue",
          fillColor: "#3f51b5",
          fillOpacity: 0.2
        }).addTo(map);
      }

      statusBox.textContent = "تم تحديد موقعك. استخدم المسارات للخروج بأمان.";
    }

    function onLocationError(e) {
      statusBox.textContent = "تعذر تحديد موقعك (فعّل GPS).";
    }

    map.on("locationfound", onLocationFound);
    map.on("locationerror", onLocationError);

    map.locate({
      setView: false,
      watch: true,
      enableHighAccuracy: true,
      maxZoom: 19
    });

    statusBox.textContent = "تم تحميل الخريطة. جارٍ تحديد موقعك...";
  </script>
</body>
</html>
