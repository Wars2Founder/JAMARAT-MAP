<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>خريطة منشأة الجمرات</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body { margin: 0; direction: rtl; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }
    #status {
      position: absolute; top: 10px; right: 10px;
      background: #fff; padding: 8px 12px; border-radius: 6px;
      z-index: 1000; font-size: 13px; box-shadow: 0 0 5px rgba(0,0,0,.2);
    }
    .legend {
      position: absolute; bottom: 10px; right: 10px;
      background: #fff; padding: 8px 12px; border-radius: 6px;
      z-index: 1000; font-size: 12px; box-shadow: 0 0 5px rgba(0,0,0,.2);
      line-height: 1.6;
    }
    .legend div { margin-bottom: 3px; }
    .legend span {
      display: inline-block; width: 14px; height: 4px; margin-left: 5px;
    }

    .jamarat-pillar {
      width: 28px;
      height: 45px;
      background: linear-gradient(to bottom, #f5f5f5, #c2c2c2);
      border-radius: 6px;
      border: 2px solid #999;
      box-shadow: 0 4px 6px rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>

<body>
  <div id="status">جاري تحميل خريطة الجمرات...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const statusBox = document.getElementById("status");

    const JAMARAT_CENTER = [21.4212, 39.8730];

    const map = L.map("map").setView(JAMARAT_CENTER, 18);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 20,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    // =========================
    // الجمرات الثلاث فقط
    // =========================
    const jamarat = [
      { name: "الجمرة الصغرى",  short: "صغرى",  coords: [21.420073957229125, 39.87400151104061] },
      { name: "الجمرة الوسطى",  short: "وسطى",  coords: [21.420888448433367, 39.87276129300216] },
      { name: "الجمرة الكبرى (العقبة)", short: "كبرى", coords: [21.421806952699566, 39.871205975494114] }
    ];

    function jamaratPillarIcon(label) {
      return L.divIcon({
        className: "",
        html: `<div class="jamarat-pillar">${label}</div>`,
        iconSize: [28, 45],
        iconAnchor: [14, 45]
      });
    }

    jamarat.forEach(j => {
      L.marker(j.coords, {
        icon: jamaratPillarIcon(j.short),
        title: j.name
      })
      .addTo(map)
      .bindPopup(j.name);
    });

    // =========================
    // GPS فقط
    // =========================
    let userMarker = null;
    let userCircle = null;

    function onLocationFound(e) {
      const radius = e.accuracy || 20;

      if (userMarker) {
        userMarker.setLatLng(e.latlng);
        userCircle.setLatLng(e.latlng).setRadius(radius);
      } else {
        userMarker = L.marker(e.latlng).addTo(map).bindPopup("موقعك الحالي");
        userCircle = L.circle(e.latlng, {
          radius: radius,
          color: "blue",
          fillColor: "#3f51b5",
          fillOpacity: 0.2
        }).addTo(map);
      }

      statusBox.textContent = "تم تحديد موقعك.";
    }

    function onLocationError(e) {
      statusBox.textContent = "تعذر تحديد موقعك (فعّل GPS).";
    }

    map.on("locationfound", onLocationFound);
    map.on("locationerror", onLocationError);

    map.locate({
      setView: false,
      watch: true,
      enableHighAccuracy: true,
      maxZoom: 19
    });

    statusBox.textContent = "تم تحميل الخريطة...";
  </script>
</body>
</html>
